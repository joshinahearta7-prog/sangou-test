<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="삼국지 인물 성향 테스트">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140b0b"/>
      <stop offset="45%" stop-color="#231111"/>
      <stop offset="100%" stop-color="#3b1414"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="crimson" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="120" cy="90" r="180" fill="#f59e0b" opacity="0.08"/>
  <circle cx="1080" cy="120" r="220" fill="#fbbf24" opacity="0.06"/>
  <circle cx="1040" cy="560" r="250" fill="#991b1b" opacity="0.10"/>

  <path d="M0 520 C140 470, 220 560, 360 520 S620 470, 760 520 S1020 560, 1200 500 L1200 630 L0 630 Z" fill="#10090a" opacity="0.55"/>

  <g opacity="0.22">
    <path d="M108 132 L200 78 L292 132 L292 240 L200 294 L108 240 Z" fill="none" stroke="#fcd34d" stroke-width="4"/>
    <path d="M185 148 L235 148 L250 170 L250 222 L200 252 L150 222 L150 170 Z" fill="none" stroke="#fcd34d" stroke-width="3"/>
  </g>

  <g transform="translate(780,90)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="420" rx="28" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)"/>
    <rect x="24" y="24" width="292" height="372" rx="22" fill="rgba(20,11,11,0.58)" stroke="rgba(251,191,36,0.18)"/>

    <rect x="52" y="300" width="236" height="18" rx="9" fill="url(#gold)" opacity="0.25"/>
    <rect x="62" y="334" width="216" height="12" rx="6" fill="#f8fafc" opacity="0.18"/>
    <rect x="78" y="358" width="184" height="12" rx="6" fill="#f8fafc" opacity="0.12"/>

    <g transform="translate(82,58)">
      <circle cx="88" cy="82" r="58" fill="rgba(251,191,36,0.18)" stroke="rgba(251,191,36,0.35)" stroke-width="3"/>
      <path d="M32 194c10-48 42-74 84-74s74 26 84 74" fill="rgba(251,191,36,0.18)"/>
      <circle cx="70" cy="80" r="5" fill="#fff"/>
      <circle cx="106" cy="80" r="5" fill="#fff"/>
      <path d="M67 102c12 10 30 10 42 0" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <path d="M46 46c10-22 32-34 56-34 20 0 42 8 58 24-20-4-32 4-38 16-12-10-42-16-76-6z" fill="url(#crimson)" opacity="0.9"/>
      <rect x="12" y="10" width="52" height="34" rx="10" fill="rgba(15,23,42,0.55)" stroke="rgba(255,255,255,0.18)"/>
      <text x="38" y="34" text-anchor="middle" font-size="22" font-weight="900" fill="#fff" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">義</text>
    </g>
  </g>

  <g transform="translate(90,80)">
    <text x="0" y="48" fill="#fde68a" font-size="28" font-weight="700" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">과연 내가 삼국지 시대에 떨어진다면</text>
    <text x="0" y="138" fill="#ffffff" font-size="74" font-weight="900" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">삼국지 인물 성향 테스트</text>
    <text x="0" y="208" fill="#e2e8f0" font-size="34" font-weight="500" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">어떤 영웅이 될까?</text>

    <g transform="translate(0,260)">
      <rect x="0" y="0" width="238" height="62" rx="18" fill="url(#gold)" filter="url(#shadow)"/>
      <text x="119" y="40" text-anchor="middle" fill="#2b1200" font-size="28" font-weight="900" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">20문항</text>

      <rect x="256" y="0" width="270" height="62" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
      <text x="391" y="40" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">18인물 매칭</text>
    </g>

    <g transform="translate(0,380)">
      <path d="M0 24 L540 24" stroke="rgba(251,191,36,0.35)" stroke-width="2"/>
      <text x="0" y="0" fill="#fcd34d" font-size="24" font-weight="700" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">유비 · 조조 · 제갈량 · 관우 · 사마의 외</text>
      <text x="0" y="72" fill="#cbd5e1" font-size="26" font-weight="500" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">나와 가장 닮은 삼국지 인물을 찾아보세요</text>
    </g>
  </g>

  <g transform="translate(640,468)" opacity="0.9">
    <path d="M0 0 L120 0 L90 18 L-30 18 Z" fill="url(#steel)"/>
    <path d="M78 -210 L92 -210 L92 0 L78 0 Z" fill="url(#steel)"/>
    <path d="M92 -206 C126 -194, 148 -174, 168 -140 C138 -136, 118 -118, 92 -98 Z" fill="url(#crimson)"/>
    <path d="M96 -182 C120 -172, 136 -160, 150 -136" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="3"/>
  </g>

  <text x="1120" y="596" text-anchor="end" fill="rgba(255,255,255,0.42)" font-size="18" font-weight="700" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">GitHub Pages · Kakao Share Ready</text>
</svg>
